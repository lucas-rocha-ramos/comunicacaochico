<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefas e Agenda</title>
    
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f5f5;
            -webkit-font-smoothing: antialiased;
            color: #1a1a1a;
            overscroll-behavior-y: none;
            height: 100vh;
            overflow: hidden;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

        .calendar-panel {
            background: white;
            border-radius: 24px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            height: fit-content;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            min-height: 48px;
        }

        .day-cell:hover {
            background: #f0f0f0;
        }

        .day-cell.today {
            background: #007AFF;
            color: white;
            font-weight: 700;
        }

        .day-cell.other-month {
            color: #d1d5db;
        }

        .day-cell.weekend {
            color: #FF3B30;
        }

        .day-cell.weekend.today {
            color: white;
        }

        .day-cell.has-event {
            font-weight: 600;
        }

        .day-cell.has-event::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #007AFF;
        }

        .day-cell.has-event.today::after {
            background: white;
        }

        .day-cell.has-event-completed::after {
            background: #34C759;
        }

        .day-cell .day-number {
            font-size: 15px;
            font-weight: 500;
            line-height: 1;
        }

        .day-cell .event-indicator {
            display: flex;
            gap: 2px;
            margin-top: 2px;
        }

        .day-cell .event-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        .event-dot.cidades { background: #007AFF; }
        .event-dot.aniversariantes { background: #FF9500; }
        .event-dot.datas { background: #AF52DE; }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px 20px;
        }

        .month-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #1a1a1a;
        }

        .nav-btn:hover {
            background: #f0f0f0;
        }

        .weekday-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #8E8E93;
            padding: 8px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .events-panel {
            background: white;
            border-radius: 24px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .events-header {
            padding: 16px 20px 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .events-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .events-header .event-count {
            font-size: 12px;
            color: #8E8E93;
            background: #f5f5f5;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .events-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .event-item {
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 4px solid #007AFF;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .event-item:hover {
            background: #f0f0f0;
            transform: translateX(4px);
        }

        .event-item.completed {
            opacity: 0.7;
            background: #f0fdf4;
            border-left-color: #34C759 !important;
        }
        .event-item.completed .event-title {
            text-decoration: line-through;
            color: #6b7280;
        }

        .event-item .event-info {
            flex: 1;
            min-width: 0;
        }

        .event-item .event-title {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-item .event-date {
            font-size: 12px;
            color: #8E8E93;
            margin-top: 2px;
        }

        .event-item .event-check {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .event-item .event-check:hover {
            border-color: #007AFF;
        }

        .event-item .event-check.done {
            background: #34C759;
            border-color: #34C759;
        }

        .event-item .event-thumbnail {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #e5e7eb;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
            background: #f3f4f6;
        }

        .event-item .event-thumbnail:hover {
            transform: scale(1.05);
            border-color: #007AFF;
        }

        .event-item .event-thumbnail.completed-thumb {
            border-color: #34C759;
        }

        .event-item .event-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            display: block;
        }

        .event-item .event-thumbnail .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            color: #9ca3af;
            font-size: 10px;
            text-align: center;
            padding: 4px;
        }

        .event-item.cidade-event { border-left-color: #007AFF; }
        .event-item.aniversariante-event { border-left-color: #FF9500; }
        .event-item.data-event { border-left-color: #AF52DE; }

        .empty-events {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8E8E93;
            text-align: center;
            padding: 40px 20px;

        .empty-events svg {

            height: 48px;
            stroke: #d1d5db;
            margin-bottom: 12px;

        .tab-button {
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;

            background: transparent;
            color: #8E8E93;
            border: none;
            cursor: pointer;
        }

        .tab-button.active {
            background: #007AFF;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25);
        }

        .tab-button:hover:not(.active) {
            background: rgba(0, 0, 0, 0.04);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online { background: #34C759; }
        .status-dot.syncing { background: #FF9500; animation: pulse 1s infinite; }
        .status-dot.offline { background: #8E8E93; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-animate {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 32px 32px 0 0;
            padding: 24px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-height: 95vh;
            overflow-y: auto;

        @media (min-width: 768px) {

        }

        .modal-content-large {
            max-width: 600px;
        }

        @media (min-width: 1024px) {
            .modal-content-large {
                max-width: 900px;
            }
        }

        .loading-spinner {

            border-top: 3px solid #007AFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .media-preview {
            width: 100%;
            max-height: 40vh;
            object-fit: contain;
            border-radius: 12px;
            background: #f3f4f6;
        }

        .upload-progress {
            background: #e5e7eb;
            border-radius: 8px;
            height: 6px;
            overflow: hidden;
            margin-top: 12px;
        }

        .upload-progress-bar {
            height: 100%;
            background: #007AFF;
            border-radius: 8px;
            transition: width 0.3s ease;
            width: 0%;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed !important;
        }

        .modal-content.no-animation {
            animation: none !important;
        }

        .image-container {
            width: 100%;
            max-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: auto;
            max-height: 50vh;
            object-fit: contain;
            border-radius: 12px;
        }

        .image-container .no-image-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            color: #9ca3af;
            text-align: center;
        }

        .image-container .no-image-placeholder svg {
            margin-bottom: 10px;
        }

        /* ============================================
           RESPONSIVIDADE - CORRIGIDA
        ============================================ */
        
        /* Layout geral */
        .app-container {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 6px;
        }

        @media (min-width: 768px) {
            .app-container {
                padding: 12px 16px;
            }
        }

        @media (min-width: 1024px) {

        }

        /* Header */
        .header-mobile {

        }

        }

        @media (min-width: 768px) {

        .tabs-container {

        .tab-button {

        @media (min-width: 768px) {

        /* Grid principal */
        .calendar-grid-container {

        }

        /* Calendário */
        .calendar-panel {
            flex: 0 0 auto;

            overflow-y: auto;
        }

        @media (max-width: 1024px) {
            .calendar-panel {
                width: 100% !important;
                max-height: 280px !important;
                flex-shrink: 0;
            }
        }

        @media (max-width: 480px) {
            .calendar-panel {
                max-height: 240px !important;
            }
        }

        @media (max-width: 380px) {
            .calendar-panel {
                max-height: 200px !important;
            }
        }

        /* Dias da semana */
        .weekday-header {
            font-size: 10px !important;
            padding: 4px 0 !important;
        }

        @media (min-width: 768px) {
            .weekday-header {

            }
        }

        /* Células do calendário */
        .day-cell {
            min-height: 36px !important;

        }

        .day-cell .day-number {
            font-size: 13px !important;
        }

        @media (max-width: 480px) {

            }

            }
        }

        @media (max-width: 380px) {

        /* Mês navegação */
        .month-nav {

        }

        .month-title {

        }

        @media (min-width: 768px) {

        .nav-btn {

        }

        /* Painel de eventos */
        .events-panel {
            flex: 1;

<body>
    <div id="app">
        <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;background:#f5f5f5;">
            <div class="loading-spinner"></div>
            <span style="color:#666;font-size:16px;">Carregando Agenda...</span>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO
        // ============================================
        const GOOGLE_SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwms4JavFxbp1XMvW-XCLzZNTN4srw-tVtonzn9m7IiHApVNDIO-0SG_xEhcbAOtbhqfA/exec";

        // ============================================
        // ESTADO GLOBAL
        // ============================================
        let state = {
            activeTab: 'cidades',
            syncStatus: 'offline',
            searchTerm: '',
            isUploadingPdf: false,
            isUploadingMedia: false,
            uploadProgress: 0,
            uploadStatus: '',
            uploadError: '',
            cidades: [],
            aniversariantes: [],
            datasComemorativas: [],
            isEditModalOpen: false,
            editingItem: null,
            editType: '',
            isImageUploadModalOpen: false,
            taskToComplete: null,
            taskTypeToComplete: '',
            tempImageBase64: '',
            tempFileName: '',
            viewMonth: new Date().getMonth(),
            viewYear: new Date().getFullYear(),
            selectedDay: new Date().getDate()
        };

        let isSaving = false;
        let updateTimeout = null;
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear();
        const currentMonth = currentDate.getMonth();
        const currentDay = currentDate.getDate();
        const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const weekDays = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];

        // ============================================
        // FUNÇÃO - RECONHECE lh3, drive e googleusercontent
        // ============================================
        const isImageUrl = (url) => {
            if (!url || typeof url !== 'string') return false;
            return url.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i) !== null ||
                   url.includes('lh3.googleusercontent.com') ||
                   url.includes('drive.google.com') ||
                   url.includes('googleusercontent.com') ||
                   url.includes('drive.googleimage');
        };

        // ============================================
        // FUNÇÃO PARA CONVERTER LINK DO GOOGLE DRIVE
        // ============================================
        const getDriveImageUrl = (url) => {
            if (!url) return '';
            if (url.includes('lh3.googleusercontent.com')) return url;
            const match = url.match(/\/d\/([^\/]+)/);
            if (match) return 'https://lh3.googleusercontent.com/d/' + match[1];
            const idMatch = url.match(/id=([^&]+)/);
            if (idMatch) return 'https://lh3.googleusercontent.com/d/' + idMatch[1];
            return url;
        };

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        const formatIncomingDate = (dateStr, tabType) => {
            if (!dateStr) return "";
            const str = String(dateStr).trim();
            
            const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) {
                const day = isoMatch[3];
                const month = isoMatch[2];
                if (tabType === 'aniversariantes') return `${day}/${month}`;
                else {
                    const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                    return `${day} de ${meses[parseInt(month, 10) - 1]}`;
                }
            }
            
            const d = new Date(str);
            if (!isNaN(d.getTime()) && str.includes("GMT")) {
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                if (tabType === 'aniversariantes') return `${day}/${month}`;
                else {
                    const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                    return `${day} de ${meses[d.getMonth()]}`;
                }
            }
            
            return str;
        };

        const extractDayMonth = (dateString) => {
            if (!dateString) return null;
            
            const str = String(dateString).trim();
            
            const slashMatch = str.match(/^(\d{1,2})\/(\d{1,2})/);
            if (slashMatch) {
                return { day: parseInt(slashMatch[1]), month: parseInt(slashMatch[2]) - 1 };
            }
            
            const monthMap = {
                'janeiro': 0, 'fevereiro': 1, 'março': 2, 'abril': 3, 'maio': 4, 'junho': 5,
                'julho': 6, 'agosto': 7, 'setembro': 8, 'outubro': 9, 'novembro': 10, 'dezembro': 11,
                'jan': 0, 'fev': 1, 'mar': 2, 'abr': 3, 'mai': 4, 'jun': 5,
                'jul': 6, 'ago': 7, 'set': 8, 'out': 9, 'nov': 10, 'dez': 11
            };
            
            const monthMatch = str.match(/(\d{1,2})\s+de\s+([a-zA-ZçÇ]+)/i);
            if (monthMatch) {
                const day = parseInt(monthMatch[1]);
                const monthName = monthMatch[2].toLowerCase();
                if (monthMap[monthName] !== undefined) {
                    return { day: day, month: monthMap[monthName] };
                }
            }
            
            const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) {
                return { day: parseInt(isoMatch[3]), month: parseInt(isoMatch[2]) - 1 };
            }
            
            const dateObj = new Date(str);
            if (!isNaN(dateObj.getTime())) {
                return { day: dateObj.getDate(), month: dateObj.getMonth() };
            }
            
            return null;
        };

        const isEventOnDay = (dateString, day, month) => {
            const parsed = extractDayMonth(dateString);
            if (!parsed) return false;
            return parsed.day === day && parsed.month === month;
        };

        const getEventsForDay = (day, month, year) => {
            let events = [];
            const activeTab = state.activeTab;
            
            if (activeTab === 'cidades' || activeTab === 'all') {
                const cidadesFiltradas = state.cidades.filter(c => isEventOnDay(c.data, day, month));
                events = events.concat(cidadesFiltradas.map(c => ({ ...c, type: 'cidades' })));
            }
            
            if (activeTab === 'aniversariantes' || activeTab === 'all') {
                const aniversariantesFiltrados = state.aniversariantes.filter(a => isEventOnDay(a.data, day, month));
                events = events.concat(aniversariantesFiltrados.map(a => ({ ...a, type: 'aniversariantes' })));
            }
            
            if (activeTab === 'datas' || activeTab === 'all') {
                const datasFiltradas = state.datasComemorativas.filter(d => isEventOnDay(d.data, day, month));
                events = events.concat(datasFiltradas.map(d => ({ ...d, type: 'datas' })));
            }
            
            return events;
        };

        const getEventsForMonth = (month, year) => {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let allEvents = [];
            
            for (let d = 1; d <= daysInMonth; d++) {
                const events = getEventsForDay(d, month, year);
                allEvents = allEvents.concat(events);
            }
            
            return allEvents;
        };

        const hasEventOnDay = (day, month, year) => {
            const events = getEventsForDay(day, month, year);
            return events.length > 0;
        };

        const allEventsCompletedOnDay = (day, month, year) => {
            const events = getEventsForDay(day, month, year);
            if (events.length === 0) return false;
            return events.every(e => e.arteFeita === true);
        };

        const getEventTypesOnDay = (day, month, year) => {
            const events = getEventsForDay(day, month, year);
            const types = events.map(e => e.type);
            return [...new Set(types)].slice(0, 3);
        };

        const filterData = (dataArray, key1, key2) => {
            if(!state.searchTerm) return dataArray;
            return dataArray.filter(item => 
                (item[key1] && item[key1].toLowerCase().includes(state.searchTerm.toLowerCase())) ||
                (item[key2] && item[key2].toLowerCase().includes(state.searchTerm.toLowerCase()))
            );
        };

        // ============================================
        // FUNÇÕES DE API
        // ============================================
        const fetchDataFromSheets = async (isSilent = false) => {
            if (!isSilent) {
                state.syncStatus = 'syncing';
                updateUI();
            }
            try {
                const response = await fetch(`${GOOGLE_SHEETS_WEB_APP_URL}?action=get_all`);
                const data = await response.json();
                
                if(data.cidades) {
                    state.cidades = data.cidades.map(item => ({...item, data: formatIncomingDate(item.data, 'cidades')}));
                }
                
                if(data.aniversariantes) {
                    state.aniversariantes = data.aniversariantes.map(item => ({...item, data: formatIncomingDate(item.data, 'aniversariantes')}));
                }
                
                if(data.datas) {
                    state.datasComemorativas = data.datas.map(item => ({...item, data: formatIncomingDate(item.data, 'datas')}));
                }
                
                state.syncStatus = 'online';
                updateUI();
            } catch (error) {
                state.syncStatus = 'offline';
                updateUI();
            }
        };

        const saveToSheets = async (action, payload) => {
            if(!GOOGLE_SHEETS_WEB_APP_URL) return false;
            
            isSaving = true;
            state.syncStatus = 'syncing';
            updateUI();
            
            try {
                const payloadToSend = { ...payload };
                
                if (payload.imagem && typeof payload.imagem === 'string' && 
                    payload.imagem.startsWith('data:image')) {
                    payloadToSend.imagem = payload.imagem;
                }
                
                const res = await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ action, ...payloadToSend })
                });
                const data = await res.json();
                
                if (data.imageUrl && isImageUrl(data.imageUrl)) {
                    const updatedItem = { ...payload, imagem: data.imageUrl };
                    if (action === 'update_cidade') {
                        state.cidades = state.cidades.map(c => c.id === payload.id ? updatedItem : c);
                    } else if (action === 'update_aniversariante') {
                        state.aniversariantes = state.aniversariantes.map(a => a.id === payload.id ? updatedItem : a);
                    } else if (action === 'update_data') {
                        state.datasComemorativas = state.datasComemorativas.map(d => d.id === payload.id ? updatedItem : d);
                    }
                }
                
                state.syncStatus = 'online';
                isSaving = false;
                updateUI();
                return data;
            } catch (error) {
                state.syncStatus = 'offline';
                isSaving = false;
                updateUI();
                return null;
            }
        };

        // ============================================
        // FUNÇÕES DE NEGÓCIO
        // ============================================
        const handleImageCompression = (file, callback) => {
            if (!file) return;
            
            const fileSize = file.size;
            const maxSize = 10 * 1024 * 1024; // 10MB
            
            if (fileSize > maxSize) {
                alert(`A imagem é muito grande (${(fileSize / 1024 / 1024).toFixed(1)}MB). O limite é 10MB.`);
                return;
            }
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height = height * (MAX_WIDTH / width);
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    callback(base64, file.name);
                }
            };
        };

        const debouncedUpdateUI = () => {
            if (updateTimeout) {
                clearTimeout(updateTimeout);
            }
            updateTimeout = setTimeout(() => {
                updateTimeout = null;
                updateUI();
            }, 300);
        };

        const toggleArteFeita = async (item, type, isDone, imageBase64 = "") => {
            const updatedItem = { 
                ...item, 
                arteFeita: isDone, 
                imagem: imageBase64 || item.imagem || ""
            };
            
            if (type === 'cidades') {
                state.cidades = state.cidades.map(c => c.id === item.id ? updatedItem : c);
            } else if (type === 'aniversariantes') {
                state.aniversariantes = state.aniversariantes.map(a => a.id === item.id ? updatedItem : a);
            } else if (type === 'datas') {
                state.datasComemorativas = state.datasComemorativas.map(d => d.id === item.id ? updatedItem : d);
            }
            
            state.isUploadingMedia = true;
            state.uploadProgress = 10;
            state.uploadStatus = 'Preparando imagem...';
            state.uploadError = '';
            updateUI();
            
            let progress = 10;
            const progressInterval = setInterval(() => {
                if (progress < 85) {
                    progress += 10;
                    state.uploadProgress = progress;
                    state.uploadStatus = progress < 50 ? 'Enviando para o Google Drive...' : 'Salvando na planilha...';
                    debouncedUpdateUI();
                }
            }, 400);
            
            try {
                const result = await saveToSheets(`update_${type === 'datas' ? 'data' : type === 'cidades' ? 'cidade' : 'aniversariante'}`, updatedItem);
                
                clearInterval(progressInterval);
                
                if (result && result.status === 'error') {
                    state.uploadError = '❌ ' + (result.message || 'Erro no upload. Tente novamente.');
                    state.isUploadingMedia = false;
                    updateUI();
                    return;
                }
                
                if (result && result.imageUrl && isImageUrl(result.imageUrl)) {
                    state.uploadProgress = 100;
                    state.uploadStatus = 'Upload concluído! ✅';
                    updateUI();
                    
                    const finalItem = { ...updatedItem, imagem: result.imageUrl };
                    if (type === 'cidades') {
                        state.cidades = state.cidades.map(c => c.id === finalItem.id ? finalItem : c);
                    } else if (type === 'aniversariantes') {
                        state.aniversariantes = state.aniversariantes.map(a => a.id === finalItem.id ? finalItem : a);
                    } else if (type === 'datas') {
                        state.datasComemorativas = state.datasComemorativas.map(d => d.id === finalItem.id ? finalItem : d);
                    }
                    
                    setTimeout(() => {
                        state.isUploadingMedia = false;
                        state.uploadProgress = 0;
                        state.uploadStatus = '';
                        state.uploadError = '';
                        state.isImageUploadModalOpen = false;
                        state.taskToComplete = null;
                        state.taskTypeToComplete = '';
                        state.tempImageBase64 = '';
                        state.tempFileName = '';
                        updateUI();
                    }, 1500);
                } else {
                    state.uploadError = '❌ Não foi possível salvar a imagem. Tente novamente.';
                    state.isUploadingMedia = false;
                    updateUI();
                }
            } catch (error) {
                clearInterval(progressInterval);
                state.uploadError = '❌ Erro de conexão. Verifique sua internet.';
                state.isUploadingMedia = false;
                updateUI();
                console.error('Erro no upload:', error);
            }
        };

        const handleCheckClick = (item, type) => {
            if (!item.arteFeita) {
                state.taskToComplete = item;
                state.taskTypeToComplete = type;
                state.tempImageBase64 = '';
                state.tempFileName = '';
                state.uploadProgress = 0;
                state.uploadStatus = '';
                state.uploadError = '';
                state.isUploadingMedia = false;
                state.isImageUploadModalOpen = true;
                updateUI();
            } else {
                const pwd = prompt("Esta arte já foi concluída. Digite a senha de administrador (2026) para desmarcá-la e remover a imagem:");
                if (pwd === "2026") {
                    toggleArteFeita(item, type, false, "");
                } else if (pwd !== null) {
                    alert("Senha incorreta!");
                }
            }
        };

        const confirmTaskCompletion = () => {
            if (!state.tempImageBase64 || state.tempImageBase64 === 'loading') {
                alert("Por favor, aguarde a imagem ser processada ou selecione outra.");
                return;
            }
            
            if (state.isUploadingMedia) {
                alert("Já está enviando. Aguarde...");
                return;
            }
            
            toggleArteFeita(
                state.taskToComplete, 
                state.taskTypeToComplete, 
                true, 
                state.tempImageBase64
            );
        };

        const openEditModal = (item, type) => {
            state.editingItem = { ...item };
            state.editType = type;
            state.isEditModalOpen = true;
            updateUI();
        };

        const handleSaveEdit = async () => {
            const itemToSave = { ...state.editingItem };
            
            if (state.editType === 'datas') {
                state.datasComemorativas = state.datasComemorativas.map(d => d.id === state.editingItem.id ? itemToSave : d);
            } else if (state.editType === 'cidades') {
                state.cidades = state.cidades.map(c => c.id === state.editingItem.id ? itemToSave : c);
            } else if (state.editType === 'aniversariantes') {
                state.aniversariantes = state.aniversariantes.map(a => a.id === state.editingItem.id ? itemToSave : a);
            }
            
            state.isEditModalOpen = false;
            updateUI();
            
            const typeStr = state.editType === 'datas' ? 'update_data' : state.editType === 'cidades' ? 'update_cidade' : 'update_aniversariante';
            const result = await saveToSheets(typeStr, itemToSave);

            if (result && result.imageUrl && isImageUrl(result.imageUrl)) {
                const finalItem = { ...itemToSave, imagem: result.imageUrl };
                if (state.editType === 'datas') {
                    state.datasComemorativas = state.datasComemorativas.map(d => d.id === finalItem.id ? finalItem : d);
                } else if (state.editType === 'cidades') {
                    state.cidades = state.cidades.map(c => c.id === finalItem.id ? finalItem : c);
                } else if (state.editType === 'aniversariantes') {
                    state.aniversariantes = state.aniversariantes.map(a => a.id === finalItem.id ? finalItem : a);
                }
                updateUI();
            }
        };

        // ============================================
        // PROCESSAMENTO DE PDF
        // ============================================
        const processPdfText = (text) => {
            const upperText = text.toUpperCase();
            let category = null;
            
            if (upperText.includes("ANIVERSÁRIO DAS CIDADES") || upperText.includes("CIDADES")) category = "cidades";
            else if (upperText.includes("DATAS COMEMORATIVAS")) category = "datas";
            else if (upperText.includes("NOME ASSESSOR") || upperText.includes("ASSESSOR")) category = "aniversariantes";

            if (!category) return alert("Não foi possível identificar a categoria do PDF.");

            const newItems = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const isIgnored = (str) => /^(DATA|CIDADE|COMEMORAÇÃO|NOME ASSESSOR|CHICO GUARNIERI|DEPUTADO|AGENDA|ANIVERSÁRIO|DATAS|PAGE|FOLHA|---)/i.test(str) || str.length <= 2;

            const pushItem = (cat, arr, date, desc) => {
                desc = desc.trim();
                if (!desc || desc.length < 2) return;
                const id = Date.now() + Math.random();
                if (cat === 'cidades') arr.push({ id, data: date, cidade: desc, anoFundacao: null, arteFeita: false, imagem: "" });
                else if (cat === 'datas') arr.push({ id, data: date, comemoracao: desc, arteFeita: false, imagem: "" });
                else arr.push({ id, data: date, nome: desc, arteFeita: false, imagem: "" });
            };

            if (category === "cidades" || category === "datas") {
                const dateRegex = /^.*?(\d{1,2}\s+de\s+[a-zA-ZçÇ]+)\s*(.*)$/i;
                let currentDateVal = null, currentDesc = "";
                for (const line of lines) {
                    let cleanLine = line.replace(/^[,;'"\-]+|[,;'"\-]+$/g, '').trim();
                    if (!cleanLine || isIgnored(cleanLine)) continue;
                    const match = cleanLine.match(dateRegex);
                    if (match) {
                        if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
                        currentDateVal = match[1].trim();
                        currentDesc = match[2].replace(/^[,;'"\-\s]+/, '').trim();
                    } else if (currentDateVal) {
                        currentDesc += (currentDesc ? " " : "") + cleanLine;
                    }
                }
                if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
            } else if (category === "aniversariantes") {
                const dateRegex = /^.*?(\d{2}\/\d{2})\s*(.*)$/i;
                let currentDateVal = null, currentDesc = "";
                for (const line of lines) {
                    let cleanLine = line.replace(/^[,;'"\-]+|[,;'"\-]+$/g, '').trim();
                    if (!cleanLine || isIgnored(cleanLine)) continue;
                    const match = cleanLine.match(dateRegex);
                    if (match) {
                        if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
                        currentDateVal = match[1].trim();
                        currentDesc = match[2].replace(/^[,;'"\-\s]+/, '').trim();
                    } else if (currentDateVal) {
                        currentDesc += (currentDesc ? " " : "") + cleanLine;
                    }
                }
                if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
            }

            if (newItems.length > 0) {
                if (confirm(`Encontrados ${newItems.length} novos itens. Salvar na planilha?`)) {
                    syncBatchToSheets(category, newItems);
                }
            } else {
                alert("Nenhum dado válido encontrado no PDF.");
            }
        };

        const syncBatchToSheets = async (category, items) => {
            if (category === 'cidades') state.cidades = [...items, ...state.cidades];
            if (category === 'aniversariantes') state.aniversariantes = [...items, ...state.aniversariantes];
            if (category === 'datas') state.datasComemorativas = [...items, ...state.datasComemorativas];
            state.activeTab = category;
            updateUI();
            
            if (!GOOGLE_SHEETS_WEB_APP_URL) return;

            isSaving = true;
            state.syncStatus = 'syncing';
            updateUI();
            
            let sheetName = '', rows = [];
            if (category === 'cidades') {
                sheetName = 'Cidades';
                rows = items.map(i => [i.id, i.data, i.cidade, i.anoFundacao || "", i.arteFeita, ""]);
            } else if (category === 'aniversariantes') {
                sheetName = 'Aniversariantes';
                rows = items.map(i => [i.id, i.data, i.nome, i.arteFeita, ""]);
            } else if (category === 'datas') {
                sheetName = 'Datas_Comemorativas';
                rows = items.map(i => [i.id, i.data, i.comemoracao, i.arteFeita, ""]);
            }

            try {
                await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'batch_add', sheetName, rows })
                });
                state.syncStatus = 'online';
            } catch (error) {
                state.syncStatus = 'offline';
            }
            
            isSaving = false;
            updateUI();
        };

        const handleFileUpload = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            state.isUploadingPdf = true;
            updateUI();

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = "";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    let lastY = -1;
                    let pageText = "";
                    for (const item of textContent.items) {
                        if (lastY !== -1 && Math.abs(lastY - item.transform[5]) > 5) pageText += "\n";
                        pageText += item.str + " ";
                        lastY = item.transform[5];
                    }
                    fullText += pageText + "\n";
                }
                processPdfText(fullText);
            } catch (error) {
                alert("Erro ao ler o arquivo PDF.");
            }
            state.isUploadingPdf = false;
            updateUI();
            event.target.value = '';
        };

        // ============================================
        // RENDERIZAÇÃO
        // ============================================
        const renderApp = () => {
            const { viewMonth, viewYear, selectedDay, activeTab } = state;
            const firstDay = new Date(viewYear, viewMonth, 1).getDay();
            const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
            const prevMonthDays = new Date(viewYear, viewMonth, 0).getDate();
            
            const days = [];
            for (let i = firstDay - 1; i >= 0; i--) {
                days.push({ day: prevMonthDays - i, isCurrentMonth: false });
            }
            for (let i = 1; i <= daysInMonth; i++) {
                days.push({ day: i, isCurrentMonth: true });
            }
            const remaining = 42 - days.length;
            for (let i = 1; i <= remaining; i++) {
                days.push({ day: i, isCurrentMonth: false });
            }

            const monthEvents = getEventsForMonth(viewMonth, viewYear);
            const dayEvents = getEventsForDay(selectedDay, viewMonth, viewYear);
            const filteredDayEvents = state.searchTerm ?
                dayEvents.filter(e => {
                    const title = e.cidade || e.nome || e.comemoracao || '';
                    return title.toLowerCase().includes(state.searchTerm.toLowerCase());
                }) : dayEvents;

            const syncClass = state.syncStatus === 'online' ? 'online' : state.syncStatus === 'syncing' ? 'syncing' : 'offline';

            const totalCidades = state.cidades.length;
            const totalAniversariantes = state.aniversariantes.length;
            const totalDatas = state.datasComemorativas.length;

            let html = `
                <div class="app-container">
                    
                    <!-- HEADER -->
                    <div class="header-mobile flex items-center justify-between bg-white rounded-xl shadow-sm border border-gray-100">
                        <div class="flex items-center gap-2 min-w-0">
                            <h1 class="font-bold text-gray-900 truncate">📅 Agenda</h1>
                            <div class="status-dot ${syncClass}" title="Status: ${state.syncStatus}"></div>
                            <span class="text-[10px] text-gray-400 hidden sm:inline">C:${totalCidades} A:${totalAniversariantes} D:${totalDatas}</span>

            `;

            return html;
        };

        // ============================================
        // FUNÇÕES DE ATUALIZAÇÃO
        // ============================================
        const updateUI = () => {
            const app = document.getElementById('app');
            app.innerHTML = renderApp();
        };

        // ============================================
        // FUNÇÕES GLOBAIS
        // ============================================
        window.setActiveTab = (tab) => {
            state.activeTab = tab;
            updateUI();
        };

        window.updateSearch = (value) => {
            state.searchTerm = value;
            updateUI();
        };

        window.changeMonth = (delta) => {
            let newMonth = state.viewMonth + delta;
            let newYear = state.viewYear;
            if (newMonth > 11) { newMonth = 0; newYear++; }
            if (newMonth < 0) { newMonth = 11; newYear--; }
            state.viewMonth = newMonth;
            state.viewYear = newYear;
            const daysInMonth = new Date(newYear, newMonth + 1, 0).getDate();
            if (state.selectedDay > daysInMonth) {
                state.selectedDay = daysInMonth;
            }
            updateUI();
        };

        window.selectDay = (day) => {
            state.selectedDay = day;
            updateUI();
        };

        window.handleImageSelect = (event) => {
            if (event.target.files && event.target.files[0]) {
                const file = event.target.files[0];
                
                state.uploadError = '';
                state.tempFileName = file.name;
                state.tempImageBase64 = 'loading';
                updateUI();
                
                handleImageCompression(file, (base64, fileName) => {
                    state.tempImageBase64 = base64;
                    state.tempFileName = fileName || '';
                    updateUI();
                });
            }
            event.target.value = '';
        };

        window.closeImageModal = () => {
            if (state.isUploadingMedia) {
                if (!confirm("O upload está em andamento. Tem certeza que deseja cancelar?")) {
                    return;
                }
            }
            state.isImageUploadModalOpen = false;
            state.taskToComplete = null;
            state.taskTypeToComplete = '';
            state.tempImageBase64 = '';
            state.tempFileName = '';
            state.uploadProgress = 0;
            state.uploadStatus = '';
            state.uploadError = '';
            state.isUploadingMedia = false;
            updateUI();
        };

        window.closeEditModal = () => {
            state.isEditModalOpen = false;
            state.editingItem = null;
            state.editType = '';
            updateUI();
        };

        window.updateEditingItem = (field, value) => {
            if (state.editingItem) {
                state.editingItem[field] = value;
            }
        };

        window.handleEditImageClick = () => {
            const isEditing = (state.editingItem?.imagem && state.editingItem.imagem.length > 10);
            const pwd = prompt(`Digite a senha de administrador (2026) para ${isEditing ? 'alterar' : 'adicionar'} a imagem:`);
            if (pwd === "2026") {
                document.getElementById('edit-image-input').click();
            } else if (pwd !== null) {
                alert("Senha incorreta!");
            }
        };

        window.handleEditImageSelect = (event) => {
            if (event.target.files && event.target.files[0]) {
                const file = event.target.files[0];
                state.editingItem.fileName = file.name;
                updateUI();
                
                handleImageCompression(file, (base64, fileName) => {
                    state.editingItem.imagem = base64;
                    state.editingItem.fileName = fileName || '';
                    updateUI();
                });
            }
            event.target.value = '';
        };

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loading').style.display = 'none';
            fetchDataFromSheets();
            
            setInterval(() => {
                if (!isSaving) {
                    fetchDataFromSheets(true);
                }
            }, 8000);
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('Service Worker removido para evitar cache!');
                }
            });
        }
    </script>
</body>
</html>
