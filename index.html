<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarefas e Agenda</title>
    
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Agenda">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f5f5;
            -webkit-font-smoothing: antialiased;
            color: #1a1a1a;
            overscroll-behavior-y: none;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        .ios-shadow {
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
        }

        .calendar-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.2s ease;
        }

        .calendar-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .day-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            border-radius: 50%;
            font-weight: 600;
            font-size: 15px;
        }

        .day-badge.today {
            background: #007AFF;
            color: white;
        }

        .day-badge.weekend {
            color: #FF3B30;
        }

        .day-badge.weekday {
            color: #1a1a1a;
        }

        .day-badge.other-month {
            color: #d1d5db;
        }

        .month-header {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .tab-button {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            background: transparent;
            color: #8E8E93;
            border: none;
            cursor: pointer;
        }

        .tab-button.active {
            background: #007AFF;
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.25);
        }

        .tab-button:hover:not(.active) {
            background: rgba(0, 0, 0, 0.04);
        }

        .check-circle {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .item-completed h3, .item-completed p, .item-completed .data-text {
            color: #8E8E93 !important;
            text-decoration: line-through;
            text-decoration-color: rgba(142, 142, 147, 0.4);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-animate {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007AFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        .modal-overlay.sm\:items-center {
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 32px 32px 0 0;
            padding: 24px;
            position: relative;
            z-index: 10;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-height: 95vh;
            overflow-y: auto;
        }

        @media (min-width: 640px) {
            .modal-content {
                border-radius: 32px;
                padding: 32px;
            }
        }

        @media (min-width: 768px) {
            .modal-content {
                max-width: 600px;
            }
        }

        .modal-content-large {
            max-width: 600px;
        }

        @media (min-width: 1024px) {
            .modal-content-large {
                max-width: 900px;
            }
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online { background: #34C759; }
        .status-dot.syncing { background: #FF9500; animation: pulse 1s infinite; }
        .status-dot.offline { background: #8E8E93; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .count-badge {
            background: rgba(0, 122, 255, 0.1);
            color: #007AFF;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading inicial -->
        <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;">
            <div class="loading-spinner"></div>
            <span style="color:#666;font-size:16px;">Carregando Agenda...</span>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO - COLE SUA URL AQUI
        // ============================================
        const GOOGLE_SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwms4JavFxbp1XMvW-XCLzZNTN4srw-tVtonzn9m7IiHApVNDIO-0SG_xEhcbAOtbhqfA/exec";

        // ============================================
        // ESTADO GLOBAL
        // ============================================
        let state = {
            activeTab: 'cidades',
            syncStatus: 'offline',
            searchTerm: '',
            isUploadingPdf: false,
            cidades: [],
            aniversariantes: [],
            datasComemorativas: [],
            isEditModalOpen: false,
            editingItem: null,
            editType: '',
            isImageUploadModalOpen: false,
            taskToComplete: null,
            taskTypeToComplete: '',
            tempImageBase64: ''
        };

        let isSaving = false;
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear();
        const currentMonth = currentDate.getMonth();
        const currentDay = currentDate.getDate();
        const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const weekDays = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];

        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        const formatIncomingDate = (dateStr, tabType) => {
            if (!dateStr) return "";
            const str = String(dateStr).trim();
            
            const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})T/);
            if (isoMatch) {
                const day = isoMatch[3];
                const month = isoMatch[2];
                if (tabType === 'aniversariantes') return `${day}/${month}`;
                else {
                    const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                    return `${day} de ${meses[parseInt(month, 10) - 1]}`;
                }
            }
            
            const d = new Date(str);
            if (!isNaN(d.getTime()) && str.includes("GMT")) {
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                if (tabType === 'aniversariantes') return `${day}/${month}`;
                else {
                    const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                    return `${day} de ${meses[d.getMonth()]}`;
                }
            }
            
            return str;
        };

        const isCurrentMonth = (dateString) => {
            if (!dateString) return false;
            const monthMap = { '01': 0, 'janeiro': 0, '02': 1, 'fevereiro': 1, '03': 2, 'março': 2, '04': 3, 'abril': 3, '05': 4, 'maio': 4, '06': 5, 'junho': 5, '07': 6, 'julho': 6, '08': 7, 'agosto': 7, '09': 8, 'setembro': 8, '10': 9, 'outubro': 9, '11': 10, 'novembro': 10, '12': 11, 'dezembro': 11 };
            
            const lowerDate = dateString.toLowerCase();
            let monthKey = null;

            if (lowerDate.includes('/')) monthKey = lowerDate.split('/')[1];
            else if (lowerDate.includes(' de ')) monthKey = lowerDate.split(' de ')[1].trim();
            
            if (monthKey && monthMap[monthKey] !== undefined) return monthMap[monthKey] === currentMonth;
            return false;
        };

        const getProgress = (type) => {
            const arr = type === 'cidades' ? state.cidades : type === 'aniversariantes' ? state.aniversariantes : state.datasComemorativas;
            if(arr.length === 0) return 0;
            const done = arr.filter(i => i.arteFeita).length;
            return Math.round((done / arr.length) * 100);
        };

        const filterData = (dataArray, key1, key2) => {
            if(!state.searchTerm) return dataArray;
            return dataArray.filter(item => 
                (item[key1] && item[key1].toLowerCase().includes(state.searchTerm.toLowerCase())) ||
                (item[key2] && item[key2].toLowerCase().includes(state.searchTerm.toLowerCase()))
            );
        };

        // ============================================
        // FUNÇÕES DE API
        // ============================================
        const fetchDataFromSheets = async (isSilent = false) => {
            if (!isSilent) {
                state.syncStatus = 'syncing';
                updateUI();
            }
            try {
                const response = await fetch(`${GOOGLE_SHEETS_WEB_APP_URL}?action=get_all`);
                const data = await response.json();
                
                if(data.cidades) state.cidades = data.cidades.map(item => ({...item, data: formatIncomingDate(item.data, 'cidades')}));
                if(data.aniversariantes) state.aniversariantes = data.aniversariantes.map(item => ({...item, data: formatIncomingDate(item.data, 'aniversariantes')}));
                if(data.datas) state.datasComemorativas = data.datas.map(item => ({...item, data: formatIncomingDate(item.data, 'datas')}));
                
                state.syncStatus = 'online';
                updateUI();
            } catch (error) {
                state.syncStatus = 'offline';
                updateUI();
            }
        };

        const saveToSheets = async (action, payload) => {
            if(!GOOGLE_SHEETS_WEB_APP_URL) return false;
            
            isSaving = true;
            state.syncStatus = 'syncing';
            updateUI();
            
            try {
                const res = await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8',
                    },
                    body: JSON.stringify({ action, ...payload })
                });
                const data = await res.json();
                state.syncStatus = 'online';
                isSaving = false;
                updateUI();
                return data;
            } catch (error) {
                state.syncStatus = 'offline';
                isSaving = false;
                updateUI();
                return null;
            }
        };

        // ============================================
        // FUNÇÕES DE NEGÓCIO
        // ============================================
        const handleImageCompression = (file, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1000;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > MAX_WIDTH) {
                        height = height * (MAX_WIDTH / width);
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.85);
                    callback(base64);
                }
            };
        };

        const toggleArteFeita = async (item, type, isDone, imageBase64 = "") => {
            const updatedItem = { ...item, arteFeita: isDone, imagem: imageBase64 };
            
            if (type === 'cidades') {
                state.cidades = state.cidades.map(c => c.id === item.id ? updatedItem : c);
            } else if (type === 'aniversariantes') {
                state.aniversariantes = state.aniversariantes.map(a => a.id === item.id ? updatedItem : a);
            } else if (type === 'datas') {
                state.datasComemorativas = state.datasComemorativas.map(d => d.id === item.id ? updatedItem : d);
            }
            
            updateUI();
            
            const result = await saveToSheets(`update_${type === 'datas' ? 'data' : type === 'cidades' ? 'cidade' : 'aniversariante'}`, updatedItem);
            
            if (result && result.imageUrl && result.imageUrl.includes('drive.google.com')) {
                const finalItem = { ...updatedItem, imagem: result.imageUrl };
                if (type === 'cidades') {
                    state.cidades = state.cidades.map(c => c.id === finalItem.id ? finalItem : c);
                } else if (type === 'aniversariantes') {
                    state.aniversariantes = state.aniversariantes.map(a => a.id === finalItem.id ? finalItem : a);
                } else if (type === 'datas') {
                    state.datasComemorativas = state.datasComemorativas.map(d => d.id === finalItem.id ? finalItem : d);
                }
                updateUI();
            }
        };

        const handleCheckClick = (item, type) => {
            if (!item.arteFeita) {
                state.taskToComplete = item;
                state.taskTypeToComplete = type;
                state.tempImageBase64 = '';
                state.isImageUploadModalOpen = true;
                updateUI();
            } else {
                const pwd = prompt("Esta arte já foi concluída. Digite a senha de administrador (2026) para desmarcá-la e remover a imagem:");
                if (pwd === "2026") {
                    toggleArteFeita(item, type, false, "");
                } else if (pwd !== null) {
                    alert("Senha incorreta!");
                }
            }
        };

        const confirmTaskCompletion = () => {
            if (!state.tempImageBase64) {
                alert("Por favor, selecione a imagem da arte finalizada.");
                return;
            }
            toggleArteFeita(state.taskToComplete, state.taskTypeToComplete, true, state.tempImageBase64);
            state.isImageUploadModalOpen = false;
            state.taskToComplete = null;
            state.taskTypeToComplete = '';
            state.tempImageBase64 = '';
            updateUI();
        };

        const openEditModal = (item, type) => {
            state.editingItem = { ...item };
            state.editType = type;
            state.isEditModalOpen = true;
            updateUI();
        };

        const handleSaveEdit = async () => {
            if (state.editType === 'datas') {
                state.datasComemorativas = state.datasComemorativas.map(d => d.id === state.editingItem.id ? state.editingItem : d);
            } else if (state.editType === 'cidades') {
                state.cidades = state.cidades.map(c => c.id === state.editingItem.id ? state.editingItem : c);
            } else if (state.editType === 'aniversariantes') {
                state.aniversariantes = state.aniversariantes.map(a => a.id === state.editingItem.id ? state.editingItem : a);
            }
            
            state.isEditModalOpen = false;
            updateUI();
            
            const typeStr = state.editType === 'datas' ? 'update_data' : state.editType === 'cidades' ? 'update_cidade' : 'update_aniversariante';
            const result = await saveToSheets(typeStr, state.editingItem);

            if (result && result.imageUrl && result.imageUrl.includes('drive.google.com')) {
                const finalItem = { ...state.editingItem, imagem: result.imageUrl };
                if (state.editType === 'datas') {
                    state.datasComemorativas = state.datasComemorativas.map(d => d.id === finalItem.id ? finalItem : d);
                } else if (state.editType === 'cidades') {
                    state.cidades = state.cidades.map(c => c.id === finalItem.id ? finalItem : c);
                } else if (state.editType === 'aniversariantes') {
                    state.aniversariantes = state.aniversariantes.map(a => a.id === finalItem.id ? finalItem : a);
                }
                updateUI();
            }
        };

        // ============================================
        // PROCESSAMENTO DE PDF
        // ============================================
        const processPdfText = (text) => {
            const upperText = text.toUpperCase();
            let category = null;
            
            if (upperText.includes("ANIVERSÁRIO DAS CIDADES") || upperText.includes("CIDADES")) category = "cidades";
            else if (upperText.includes("DATAS COMEMORATIVAS")) category = "datas";
            else if (upperText.includes("NOME ASSESSOR") || upperText.includes("ASSESSOR")) category = "aniversariantes";

            if (!category) return alert("Não foi possível identificar a categoria do PDF.");

            const newItems = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const isIgnored = (str) => /^(DATA|CIDADE|COMEMORAÇÃO|NOME ASSESSOR|CHICO GUARNIERI|DEPUTADO|AGENDA|ANIVERSÁRIO|DATAS|PAGE|FOLHA|---)/i.test(str) || str.length <= 2;

            const pushItem = (cat, arr, date, desc) => {
                desc = desc.trim();
                if (!desc || desc.length < 2) return;
                const id = Date.now() + Math.random();
                if (cat === 'cidades') arr.push({ id, data: date, cidade: desc, anoFundacao: null, arteFeita: false, imagem: "" });
                else if (cat === 'datas') arr.push({ id, data: date, comemoracao: desc, arteFeita: false, imagem: "" });
                else arr.push({ id, data: date, nome: desc, arteFeita: false, imagem: "" });
            };

            if (category === "cidades" || category === "datas") {
                const dateRegex = /^.*?(\d{1,2}\s+de\s+[a-zA-ZçÇ]+)\s*(.*)$/i;
                let currentDateVal = null, currentDesc = "";
                for (const line of lines) {
                    let cleanLine = line.replace(/^[,;'"\-]+|[,;'"\-]+$/g, '').trim();
                    if (!cleanLine || isIgnored(cleanLine)) continue;
                    const match = cleanLine.match(dateRegex);
                    if (match) {
                        if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
                        currentDateVal = match[1].trim();
                        currentDesc = match[2].replace(/^[,;'"\-\s]+/, '').trim();
                    } else if (currentDateVal) {
                        currentDesc += (currentDesc ? " " : "") + cleanLine;
                    }
                }
                if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
            } else if (category === "aniversariantes") {
                const dateRegex = /^.*?(\d{2}\/\d{2})\s*(.*)$/i;
                let currentDateVal = null, currentDesc = "";
                for (const line of lines) {
                    let cleanLine = line.replace(/^[,;'"\-]+|[,;'"\-]+$/g, '').trim();
                    if (!cleanLine || isIgnored(cleanLine)) continue;
                    const match = cleanLine.match(dateRegex);
                    if (match) {
                        if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
                        currentDateVal = match[1].trim();
                        currentDesc = match[2].replace(/^[,;'"\-\s]+/, '').trim();
                    } else if (currentDateVal) {
                        currentDesc += (currentDesc ? " " : "") + cleanLine;
                    }
                }
                if (currentDateVal && currentDesc) pushItem(category, newItems, currentDateVal, currentDesc);
            }

            if (newItems.length > 0) {
                if (confirm(`Encontrados ${newItems.length} novos itens. Salvar na planilha?`)) {
                    syncBatchToSheets(category, newItems);
                }
            } else {
                alert("Nenhum dado válido encontrado no PDF.");
            }
        };

        const syncBatchToSheets = async (category, items) => {
            if (category === 'cidades') state.cidades = [...items, ...state.cidades];
            if (category === 'aniversariantes') state.aniversariantes = [...items, ...state.aniversariantes];
            if (category === 'datas') state.datasComemorativas = [...items, ...state.datasComemorativas];
            state.activeTab = category;
            updateUI();
            
            if (!GOOGLE_SHEETS_WEB_APP_URL) return;

            isSaving = true;
            state.syncStatus = 'syncing';
            updateUI();
            
            let sheetName = '', rows = [];
            if (category === 'cidades') {
                sheetName = 'Cidades';
                rows = items.map(i => [i.id, i.data, i.cidade, i.anoFundacao || "", i.arteFeita, ""]);
            } else if (category === 'aniversariantes') {
                sheetName = 'Aniversariantes';
                rows = items.map(i => [i.id, i.data, i.nome, i.arteFeita, ""]);
            } else if (category === 'datas') {
                sheetName = 'Datas_Comemorativas';
                rows = items.map(i => [i.id, i.data, i.comemoracao, i.arteFeita, ""]);
            }

            try {
                await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'batch_add', sheetName, rows })
                });
                state.syncStatus = 'online';
            } catch (error) {
                state.syncStatus = 'offline';
            }
            
            isSaving = false;
            updateUI();
        };

        const handleFileUpload = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            state.isUploadingPdf = true;
            updateUI();

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = "";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    let lastY = -1;
                    let pageText = "";
                    for (const item of textContent.items) {
                        if (lastY !== -1 && Math.abs(lastY - item.transform[5]) > 5) pageText += "\n";
                        pageText += item.str + " ";
                        lastY = item.transform[5];
                    }
                    fullText += pageText + "\n";
                }
                processPdfText(fullText);
            } catch (error) {
                alert("Erro ao ler o arquivo PDF.");
            }
            state.isUploadingPdf = false;
            updateUI();
            event.target.value = '';
        };

        // ============================================
        // RENDERIZAÇÃO - HTML PURO
        // ============================================
        const createCalendarView = () => {
            const firstDay = new Date(currentDate.getFullYear(), currentMonth, 1);
            const daysInMonth = new Date(currentDate.getFullYear(), currentMonth + 1, 0).getDate();

            const remainingDays = 42 - days.length;
            for (let i = 1; i <= remainingDays; i++) {
                days.push({ day: i, isCurrentMonth: false });
            }

            const getTasksForDay = (day) => {
                if (!day.isCurrentMonth) return 0;
                const dayStr = String(day.day).padStart(2, '0');
                const monthStr = String(currentMonth + 1).padStart(2, '0');
                const datePattern = `${dayStr}/${monthStr}`;
                
                let count = 0;
                if (state.activeTab === 'cidades') {
                    count = state.cidades.filter(c => c.data && c.data.includes(datePattern)).length;
                } else if (state.activeTab === 'aniversariantes') {
                    count = state.aniversariantes.filter(a => a.data && a.data.includes(datePattern)).length;
                } else {
                    count = state.datasComemorativas.filter(d => d.data && d.data.includes(datePattern)).length;
                }
                return count;
            };

            let html = `
                <div class="glass-panel rounded-2xl p-6 mb-6 ios-shadow">

                            const taskCount = getTasksForDay(day);

                                        ${state.editType === 'aniversariantes' ? `
                                            <div>
                                                <label class="block text-sm font-semibold text-gray-500 mb-2 ml-1 uppercase tracking-wider">Nome do Assessor</label>
                                                <input type="text" value="${state.editingItem?.nome || ''}" onchange="updateEditingItem('nome', this.value)" class="w-full bg-gray-50 border border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 rounded-xl px-5 py-4 outline-none transition-all font-medium text-gray-900" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-semibold text-gray-500 mb-2 ml-1 uppercase tracking-wider">Data (DD/MM)</label>
                                                <input type="text" value="${state.editingItem?.data || ''}" onchange="updateEditingItem('data', this.value)" class="w-full bg-gray-50 border border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 rounded-xl px-5 py-4 outline-none transition-all font-medium text-gray-900" />
                                            </div>
                                        ` : ''}

                                        ${state.editType === 'datas' ? `
                                            <div>
                                                <label class="block text-sm font-semibold text-gray-500 mb-2 ml-1 uppercase tracking-wider">Comemoração</label>
                                                <input type="text" value="${state.editingItem?.comemoracao || ''}" onchange="updateEditingItem('comemoracao', this.value)" class="w-full bg-gray-50 border border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 rounded-xl px-5 py-4 outline-none transition-all font-medium text-gray-900" />
                                            </div>
                                            <div>
                                                <label class="block text-sm font-semibold text-gray-500 mb-2 ml-1 uppercase tracking-wider">Data</label>
                                                <input type="text" value="${state.editingItem?.data || ''}" onchange="updateEditingItem('data', this.value)" class="w-full bg-gray-50 border border-transparent focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 rounded-xl px-5 py-4 outline-none transition-all font-medium text-gray-900" />
                                            </div>
                                        ` : ''}
                                    </div>

                                    ${state.editingItem?.arteFeita ? `
                                        <div class="mt-8 md:mt-0 md:w-1/2 border-t md:border-t-0 md:border-l border-gray-200 pt-8 md:pt-0 md:pl-10 flex flex-col justify-center">
                                            <label class="block text-sm font-semibold text-gray-500 mb-4 ml-1 uppercase tracking-wider text-center md:text-left">Arte Concluída</label>
                                            
                                            <div class="w-full flex-1 flex items-center justify-center bg-gray-50 rounded-2xl border border-gray-200 p-3 mb-6 min-h-[200px]">
                                                ${(state.editingItem?.imagem && state.editingItem.imagem.length > 5) ? `
                                                    <img src="${state.editingItem.imagem}" alt="Arte Finalizada" referrerpolicy="no-referrer" crossorigin="anonymous" class="w-full h-auto max-h-[50vh] lg:max-h-[60vh] object-contain rounded-xl shadow-lg" />
                                                ` : `
                                                    <div class="flex flex-col items-center justify-center text-center p-6 h-full w-full">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                                                        <p class="text-gray-400 text-sm font-medium">Imagem não encontrada</p>
                                                        <p class="text-gray-300 text-xs mt-1">A arte foi marcada como concluída, mas a imagem não foi salva. Adicione abaixo.</p>
                                                    </div>
                                                `}
                                            </div>
                                            
                                            <div class="flex flex-col sm:flex-row gap-3 sm:space-x-4 mt-auto">
                                                ${(state.editingItem?.imagem && state.editingItem.imagem.length > 5) ? `
                                                    <a href="${state.editingItem.imagem}" target="_blank" rel="noreferrer" download="Arte_${state.editingItem.id}.jpg" class="flex-1 flex justify-center items-center bg-green-50 hover:bg-green-100 text-green-700 font-semibold py-3.5 rounded-xl active:scale-[0.98] transition-all text-sm">
                                                        Baixar Imagem
                                                    </a>
                                                ` : `
                                                    <button disabled class="flex-1 flex justify-center items-center bg-gray-50 text-gray-400 font-semibold py-3.5 rounded-xl cursor-not-allowed text-sm">
                                                        Baixar Imagem
                                                    </button>
                                                `}
                                                
                                                <button onclick="handleEditImageClick()" class="flex-1 flex justify-center items-center bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold py-3.5 rounded-xl active:scale-[0.98] transition-all text-sm">
                                                    ${(state.editingItem?.imagem && state.editingItem.imagem.length > 5) ? 'Alterar Imagem' : 'Adicionar Imagem'}
                                                </button>
                                                
                                                <input type="file" id="edit-image-input" accept="image/*" class="hidden" onchange="handleEditImageSelect(event)" />
                                            </div>
                                        </div>
                                    ` : ''}
                                </div>

                                <div class="mt-10 flex flex-col sm:flex-row gap-3 sm:space-x-4 border-t border-gray-200 pt-8">
                                    <button onclick="closeEditModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-4 rounded-xl active:scale-[0.98] transition-all">
                                        Cancelar
                                    </button>
                                    <button onclick="handleSaveEdit()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl active:scale-[0.98] transition-all shadow-lg shadow-blue-500/30">
                                        Salvar Alterações
                                    </button>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;

            return html;
        };

        // ============================================
        // FUNÇÕES DE ATUALIZAÇÃO DA UI
        // ============================================
        const updateUI = () => {
            const app = document.getElementById('app');
            app.innerHTML = renderApp();
        };

        // ============================================
        // FUNÇÕES GLOBAIS (chamadas pelos eventos HTML)
        // ============================================
        window.setActiveTab = (tab) => {
            state.activeTab = tab;
            updateUI();
        };

        window.updateSearch = (value) => {
            state.searchTerm = value;
            updateUI();
        };

        window.handleImageSelect = (event) => {
            if (event.target.files && event.target.files[0]) {
                handleImageCompression(event.target.files[0], (base64) => {
                    state.tempImageBase64 = base64;
                    updateUI();
                });
            }
            event.target.value = '';
        };

        window.closeImageModal = () => {
            state.isImageUploadModalOpen = false;
            state.taskToComplete = null;
            state.taskTypeToComplete = '';
            state.tempImageBase64 = '';
            updateUI();
        };

        window.closeEditModal = () => {
            state.isEditModalOpen = false;
            state.editingItem = null;
            state.editType = '';
            updateUI();
        };

        window.updateEditingItem = (field, value) => {
            if (state.editingItem) {
                state.editingItem[field] = value;
            }
        };

        window.handleEditImageClick = () => {
            const isEditing = (state.editingItem?.imagem && state.editingItem.imagem.length > 5);
            const pwd = prompt(`Digite a senha de administrador (2026) para ${isEditing ? 'alterar' : 'adicionar'} a imagem:`);
            if (pwd === "2026") {
                document.getElementById('edit-image-input').click();
            } else if (pwd !== null) {
                alert("Senha incorreta!");
            }
        };

        window.handleEditImageSelect = (event) => {
            if (event.target.files && event.target.files[0]) {
                handleImageCompression(event.target.files[0], (base64) => {
                    state.editingItem.imagem = base64;
                    updateUI();
                });
            }
            event.target.value = '';
        };

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            // Esconder loading
            document.getElementById('loading').style.display = 'none';
            
            // Buscar dados
            fetchDataFromSheets();
            
            // Atualização automática a cada 8 segundos
            setInterval(() => {
                if (!isSaving) {
                    fetchDataFromSheets(true);
                }
            }, 8000);
        });
    </script>

    <script>
        // Service Worker (PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('PWA Service Worker registrado!', reg.scope);
                }).catch(err => {
                    console.log('Erro no PWA Service Worker:', err);
                });
            });
        }
    </script>
</body>
</html>
